  <!-- Equalizer bars (static; same layout as nav) -->
  <rect x="7" y="13" width="3" height="8" rx="1.5" fill="#fff" />
  <rect x="12" y="11" width="3" height="12" rx="1.5" fill="#fff" />
  <rect x="17" y="8" width="3" height="16" rx="1.5" fill="#fff" />
  <rect x="22" y="12" width="3" height="10" rx="1.5" fill="#fff" />
</svg>
